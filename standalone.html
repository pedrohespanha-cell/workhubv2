    function getISOWeek(d) {
      const date = new Date(d.getTime());
      date.setHours(0, 0, 0, 0);
      date.setDate(date.getDate() + 3 - (date.getDay() + 6) % 7);
      const week1 = new Date(date.getFullYear(), 0, 4);
      return 1 + Math.round(((date.getTime() - week1.getTime()) / 86400000 - 3 + (week1.getDay() + 6) % 7) / 7);
    }

    function calculateHours(start, end) {
      if (!start || !end) return 0;
      const s = new Date(`2000-01-01T${start}`);
      let e = new Date(`2000-01-01T${end}`);
      if (e < s) e.setDate(e.getDate() + 1);
      return (e.getTime() - s.getTime()) / (1000 * 60 * 60);
    }

    function calculateOT(act, type) {
      if (!act || type === 'unknown') return act || 0;
      let earned = act <= 8 ? act : act <= 12 ? 8 + (act - 8) * 1.5 : act <= 14 ? 8 + 6 + (act - 12) * 2 : 8 + 6 + 4 + (act - 14) * 3;
      const min = type === '8hr' ? 8 : type === '10hr' ? 11 : type === '12hr' ? 14 : 0;
      return Math.max(earned, min);
    }

    function formatCurr(n) {
      const val = typeof n === 'string' ? parseFloat(n) : n;
      return isNaN(val) ? '$0.00' : new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(val);
    }

    function getWeekKey(d) {
      const date = new Date(d + 'T12:00:00');
      const day = date.getDay();
      const diff = date.getDate() - day + (day === 0 ? -6 : 1);
      return new Date(date.setDate(diff)).toISOString().split('T')[0];
    }

    function getWeekDateRange(wKey) {
      const start = new Date(wKey + 'T12:00:00');
      const end = new Date(start);
      end.setDate(end.getDate() + 6);
      const fmt = { month: 'short', day: 'numeric' };
      return `${start.toLocaleDateString('en-US', fmt)} - ${end.toLocaleDateString('en-US', fmt)}, ${end.getFullYear()}`;
    }

    function parseCSVLine(line) {
      const result = [];
      let current = '';
      let inQuotes = false;
      for (let i = 0; i < line.length; i++) {
        const char = line[i];
        if (char === '"') inQuotes = !inQuotes;
        else if (char === ',' && !inQuotes) {
          result.push(current.trim());
          current = '';
        } else current += char;
      }
      result.push(current.trim());
      return result;
    }

    async function parseWebArchive(file) {
      const buffer = await file.arrayBuffer();
      const decoder = new TextDecoder('utf-8');
      const text = decoder.decode(buffer);
      const cleanText = text.replace(/\0/g, '');
      const htmlMatch = cleanText.match(/<html[^>]*>[\s\S]*?<\/html>/i);
      if (htmlMatch) {
        return parseHTMLText(htmlMatch[0]);
      }
      throw new Error("Could not find HTML content in WebArchive");
    }

    async function parsePDF(file) {
      const arrayBuffer = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
      let fullText = "";
      for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const content = await page.getTextContent();
        fullText += content.items.map(item => item.str).join(" ") + "\n";
      }
      const newProds = [];
      const blocks = fullText.split(/PRODUCTION TITLE/i).slice(1);
      blocks.forEach(block => {
        const nameMatch = block.match(/^\s*:\s*([^\n]+)/);
        const name = nameMatch ? nameMatch[1].trim() : "Unknown";
        const companyMatch = block.match(/Production Company\s*:\s*([^\n]+)/i);
        const company = companyMatch ? companyMatch[1].trim() : "";
        const datesMatch = block.match(/Production Dates\s*:\s*([^\n]+)/i);
        const dates = datesMatch ? datesMatch[1].trim() : "";
        const tierMatch = block.match(/Production Tier\s*:\s*([^\n]+)/i);
        const tier = tierMatch ? tierMatch[1].trim() : "";
        const payrollMatch = block.match(/Payroll Email\s*:\s*([^\n]+)/i);
        const payroll = payrollMatch ? payrollMatch[1].trim() : "";
        const prodEmailMatch = block.match(/Production Email\s*:\s*([^\n]+)/i);
        const prodEmail = prodEmailMatch ? prodEmailMatch[1].trim() : "";
        const crew = {};
        const crewSection = block.split(/CREW LIST/i)[1];
        if (crewSection) {
          const lines = crewSection.split('\n');
          lines.forEach(line => {
            const parts = line.split(':');
            if (parts.length >= 2) {
              const role = parts[0].trim();
              const person = parts[1].trim();
              if (person && person !== 'N/A') crew[role] = person;
            }
          });
        }
        newProds.push({ id: crypto.randomUUID(), name, company, prodEmail, payroll, crew, dates, tier, status: name.startsWith('WRAPPED') ? 'Wrapped' : 'Active' });
      });
      return newProds;
    }

    function mapTierToStandard(rawTier) {
      if (!rawTier) return "Standard Television";
      const t = rawTier.toLowerCase();
      if (t.includes('rumoured')) return "Rumoured";
      if (t.includes('premium') || t.includes('hbsvod tier 1')) return "Premium Network & SVOD";
      if (t.includes('mid-tier') || t.includes('hbsvod tier 2')) return "Mid-Tier Network & SVOD";
      if (t.includes('entry') || t.includes('hbsvod tier 3')) return "Entry-Tier Network & SVOD";
      if (t.includes('feature')) return t.includes('low budget') ? "Low Budget Feature Films" : "Feature Films";
      if (t.includes('new episodic')) return "New Episodic Series";
      return "Standard Television"; 
    }

    function getCurrentRate(tier, roleName) {
      if(!tier || tier === 'Rumoured' || !roleName) return null;
      const stdTier = mapTierToStandard(tier);
      const stdRole = MAP_POS[roleName];
      if(!WAGES[stdTier] || !WAGES[stdTier][stdRole]) return null;

      const now = new Date();
      let periodIdx = 0;
      for (let p of WAGE_PERIODS) {
        if (now >= new Date(p.start) && now <= new Date(p.end)) {
          periodIdx = p.idx;
          break;
        }
      }
      return WAGES[stdTier][stdRole][periodIdx];
    }

    // --- PARSERS ---
    const parseHTMLText = (htmlString) => {
      const parser = new DOMParser();

      const newProds = [];
      const items = doc.querySelectorAll('.item');
      items.forEach(item => {
        const titleEl = item.querySelector('.current-production-title a');
        if (!titleEl) return;
        const name = titleEl.innerText.trim();
        let company = '', prodEmail = '', payroll = '', dates = '', tier = '';
        const tableTop = item.querySelector('.table-headertop-content');
        if (tableTop) {
          const tds = tableTop.querySelectorAll('td');
          if (tds[0]) company = tds[0].innerText.trim();
          const mailto = tableTop.querySelector('a[href^="mailto:"]');
          if (mailto && !mailto.innerText.toLowerCase().includes('payroll')) prodEmail = mailto.innerText.trim();
        }
        const emailEl = item.querySelector('p[style*="color:green"]');
        if (emailEl) payroll = emailEl.innerText.replace('Payroll email:', '').trim();
        
        let phone = '', address = '';
        const textContent = item.innerText || '';
        const phoneMatch = textContent.match(/\(?\d{3}\)?[-.\s]?\d{3}[-.\s]?\d{4}/);
        if (phoneMatch) phone = phoneMatch[0];
        
        const postalMatch = textContent.match(/[A-Z]\d[A-Z]\s?\d[A-Z]\d/i);
        if (postalMatch) {
          const lines = textContent.split('\n');
          const addrLine = lines.find(l => l.includes(postalMatch[0]));
          if (addrLine) address = addrLine.trim();
        }

        const crew = {};
        const bottomDiv = item.querySelector('.current-production-bottom');
        if (bottomDiv) {
          bottomDiv.querySelectorAll('tr').forEach(row => {
            const cols = row.querySelectorAll('td');
            if (cols.length >= 2) {
              const role = cols[0].innerText.trim();
              const person = cols[1].innerText.trim().replace(/\s+/g, ' ');
              if (person !== 'N/A' && person !== '' && person !== 'Various') crew[role] = person;
            }
          });
        }
        const rightDiv = item.querySelector('.current-production-right');
        if(rightDiv) {
          const tdElements = rightDiv.querySelectorAll('td');
          tdElements.forEach(td => {
            if(td.innerHTML.includes('<time')) {
              const times = td.querySelectorAll('time');
              if(times.length >= 2) dates = `${times[0].innerText} to ${times[1].innerText}`;
            }
            if(td.innerText.includes('(Daily Seniority)') || td.innerText.includes('Supplemental TV') || td.innerText.includes('Tier')) tier = td.innerText.trim();
          });
        }
        newProds.push({ id: crypto.randomUUID(), name, company, prodEmail, payroll, phone, address, contractLink: '', callSheetLink: '', crew, dates, tier, status: name.startsWith('WRAPPED') ? 'Wrapped' : 'Active' });
      });
      return newProds;
    };

    // --- MAIN APP ---
    const App = () => {

      // UI State

      const [payModal, setPayModal] = useState({ isOpen: false, weekKey: '', showName: '', gross: '', net: '' });

      const [wipeModal, setWipeModal] = useState(null);

      const [isProdSettingsOpen, setIsProdSettingsOpen] = useState(false);
      const [prodSettings, setProdSettings] = useState({ role1: 'Gaffer', role2: 'Rigging Gaffer', showRates: true });
      
      // Log Tab States
      const [globalFilter, setGlobalFilter] = useState('All'); 
      const [formData, setFormData] = useState({ id: 0, date: new Date().toISOString().split('T')[0], show: '', position: 'Rigging LX', startTime: '07:00', endTime: '19:00', notes: '', gross: '', net: '', minPayType: '12hr', saveDefault: true });
      const [isEditingEntry, setIsEditingEntry] = useState(false);
      const [scratchpadText, setScratchpadText] = useState('');
      const [statusMsg, setStatusMsg] = useState('');
      const [history, setHistory] = useState([]);
      const [isLoading, setIsLoading] = useState(true);

      const saveToHistory = (newEntries, newProds = productions) => {
        setHistory(prev => [...prev.slice(-9), { entries, productions }]);
        setEntries(newEntries);
        setProductions(newProds);
      };

      const handleUndo = () => {
        if (history.length === 0) return;
        const prev = history[history.length - 1];
        setEntries(prev.entries);
        setProductions(prev.productions);
        setHistory(h => h.slice(0, -1));
        showStatus("Undo successful");
      };

      const [dashSettings, setDashSettings] = useState(DEFAULT_DASH_SETTINGS);
      const [isDashSettingsOpen, setIsDashSettingsOpen] = useState(false);
      
      // Cloud Sync State
      const [fbConfig, setFbConfig] = useState(null);
      const [syncId, setSyncId] = useState('');
      const [syncStatus, setSyncStatus] = useState('disconnected'); // disconnected, connecting, connected, error
      const [lastSync, setLastSync] = useState(null);
      const [isSyncSettingsOpen, setIsSyncSettingsOpen] = useState(false);

      // --- INITIALIZATION ---
      useEffect(() => {
        const savedProdSettings = localStorage.getItem('pt_prod_settings');
        if (savedProdSettings) setProdSettings(JSON.parse(savedProdSettings));
        
        const savedDashSettings = localStorage.getItem('pt_dash_settings');
        if (savedDashSettings) setDashSettings({...DEFAULT_DASH_SETTINGS, ...JSON.parse(savedDashSettings)});

        const savedFbConfig = localStorage.getItem('pt_fb_config');
        if (savedFbConfig) setFbConfig(JSON.parse(savedFbConfig));

        const savedSyncId = localStorage.getItem('pt_sync_id');
        if (savedSyncId) setSyncId(savedSyncId);

        const savedTimes = JSON.parse(localStorage.getItem('pt_last_times') || '{"start":"07:00", "end":"19:00"}');
        setFormData(prev => ({...prev, startTime: savedTimes.start, endTime: savedTimes.end}));

        const e = localStorage.getItem('pt_entries'); if (e) setEntries(JSON.parse(e));
        const p = localStorage.getItem('pt_prods'); if (p) setProductions(JSON.parse(p));
        setIsLoading(false);
      }, []);

      // Firebase Sync Logic
      const fbAppRef = useRef(null);
      const fbDbRef = useRef(null);

      useEffect(() => {
        if (!fbConfig || !syncId || !window.FB) return;

        let unsubscribe = null;
        const initSync = async () => {
          try {
            setSyncStatus('connecting');
            if (!fbAppRef.current) {
              fbAppRef.current = window.FB.initializeApp(fbConfig);
              fbDbRef.current = window.FB.getFirestore(fbAppRef.current);
            }
            const auth = window.FB.getAuth(fbAppRef.current);
            const db = fbDbRef.current;

            await window.FB.signInAnonymously(auth);
            
            // Listen for remote changes
            unsubscribe = window.FB.onSnapshot(window.FB.doc(db, "users", syncId), (doc) => {
              if (doc.exists()) {
                const data = doc.data();
                // Only update if remote is newer or local is empty
                if (data.entries) setEntries(data.entries);
                if (data.productions) setProductions(data.productions);
                setLastSync(new Date());
                setSyncStatus('connected');
              } else {
                setSyncStatus('connected');
              }
            }, (err) => {
              console.error(err);
              setSyncStatus('error');
            });
          } catch (err) {
            console.error(err);
            setSyncStatus('error');
          }
        };

        initSync();
        return () => unsubscribe && unsubscribe();
      }, [fbConfig, syncId]);

      // Push local changes to cloud
      useEffect(() => {
        if (syncStatus !== 'connected' || !fbDbRef.current || !syncId || !window.FB) return;
        
        const pushData = async () => {
          try {
            const db = fbDbRef.current;
            await window.FB.setDoc(window.FB.doc(db, "users", syncId), {
              entries,
              productions,
              updatedAt: new Date()
            }, { merge: true });
            setLastSync(new Date());
          } catch (err) {
            console.error("Push failed:", err);
          }
        };

        const timeout = setTimeout(pushData, 2000); // Debounce push
        return () => clearTimeout(timeout);
      }, [entries, productions, syncStatus, syncId]);

      useEffect(() => {
        localStorage.setItem('pt_entries', JSON.stringify(entries));
        localStorage.setItem('pt_prods', JSON.stringify(productions));
      }, [entries, productions]);

      useEffect(() => {
        if (theme === 'dark') document.documentElement.classList.add('dark');
        else document.documentElement.classList.remove('dark');
      }, [theme]);

      function showStatus(msg) {
          setStatusMsg(msg);
          setTimeout(() => setStatusMsg(''), 3000);
      }

      const autoCalculateGross = () => {
          if (!formData.show || !formData.position || !formData.date) {
              showStatus("Need Show, Date, and Position to calc.");
              return;
          }
          const prod = productions.find(p => p.name === formData.show);
          if (!prod) { showStatus("Show not in database."); return; }
          const rate = getCurrentRate(prod.tier, formData.position);
          if (!rate) { showStatus(`No rate found.`); return; }
          const h = calculateHours(formData.startTime, formData.endTime);
          const ph = calculateOT(h, formData.minPayType);
          setFormData(prev => ({...prev, gross: (ph * rate).toFixed(2) }));
          showStatus(`Auto-calculated at $${rate}/hr`);
      };

      const handleTsSubmit = (e) => {
        e.preventDefault();
        
        if (!isEditingEntry) {
          const isDup = entries.some(ent => ent.date === formData.date && ent.show === formData.show && ent.startTime === formData.startTime);
          if (isDup) {
            showStatus("Duplicate entry detected!");
            return;
          }
        }

        const h = calculateHours(formData.startTime, formData.endTime);
        const ph = calculateOT(h, formData.minPayType);
        const ent = { ...formData, id: isEditingEntry ? formData.id : Date.now(), hours: h, payableHours: ph, gross: formData.gross === '' ? '' : parseFloat(formData.gross), net: formData.net === '' ? '' : parseFloat(formData.net) };
        if (formData.saveDefault) {
            const defaults = JSON.parse(localStorage.getItem('pt_defaults') || '{}');
            defaults[formData.show] = { position: formData.position, minPayType: formData.minPayType };
            localStorage.setItem('pt_defaults', JSON.stringify(defaults));
        }
        localStorage.setItem('pt_last_times', JSON.stringify({ start: formData.startTime, end: formData.endTime }));
        saveToHistory(isEditingEntry ? entries.map(x => x.id === ent.id ? ent : x) : [...entries, ent]);
        setIsEditingEntry(false); setIsMobileFormOpen(false);
        setFormData(prev => ({ ...prev, id: 0, gross: '', net: '', notes: '' }));
        showStatus('Entry Saved!');
      };

      const handleTsDelete = (id) => {
          saveToHistory(entries.filter(e => e.id !== id));
      };

      const handleHTMLImport = () => {
          if (!scratchpadText) return;
          const parsed = parseHTMLText(scratchpadText);
          setProductions(prev => {
            const existingNames = new Set(prev.map(p => p.name));
            const uniqueNew = parsed.filter(p => !existingNames.has(p.name));
            return [...prev, ...uniqueNew];
          });
          setScratchpadText('');
          showStatus(`Successfully parsed ${parsed.length} productions!`);
          setProdTab('dashboard');
      };

      const handlePDFImport = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        try {
          showStatus("Parsing PDF...");
          const parsed = await parsePDF(file);
          setProductions(prev => {
            const existingNames = new Set(prev.map(p => p.name));
            const uniqueNew = parsed.filter(p => !existingNames.has(p.name));
            return [...prev, ...uniqueNew];
          });
          showStatus(`Imported ${parsed.length} productions!`);
          setProdTab('dashboard');
        } catch (err) {
          console.error(err);
          showStatus("Error parsing PDF.");
        }
      };

      const exportCSV = () => {
        if (entries.length === 0) return;
        const headers = ["Date", "Show", "Position", "Start", "End", "Hours", "PayableHours", "Gross", "Net", "Notes"];
        const rows = entries.map(e => [
          e.date, e.show, e.position, e.startTime, e.endTime, e.hours, e.payableHours, e.gross, e.net, `"${e.notes || ''}"`
        ]);
        const csvContent = [headers.join(","), ...rows.map(r => r.join(","))].join("\n");
        const blob = new Blob([csvContent], { type: 'text/csv' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `payroll_export_${new Date().toISOString().split('T')[0]}.csv`;
        a.click();
      };

      const importCSV = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (evt) => {
          const text = evt.target.result;
          const lines = text.split('\n').filter(l => l.trim());
          const newEntries = lines.slice(1).map(line => {
            const cols = parseCSVLine(line);
            return {
              id: Date.now() + Math.random(),
              date: cols[0], show: cols[1], position: cols[2], startTime: cols[3], endTime: cols[4],
              hours: parseFloat(cols[5]), payableHours: parseFloat(cols[6]),
              gross: parseFloat(cols[7]), net: parseFloat(cols[8]), notes: cols[9]?.replace(/"/g, '') || ''
            };
          });
          saveToHistory([...entries, ...newEntries]);
          showStatus(`Imported ${newEntries.length} entries!`);
        };
        reader.readAsText(file);
      };

      const handleWebArchiveImport = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        try {
          showStatus("Parsing WebArchive...");
          const parsed = await parseWebArchive(file);
          setProductions(prev => {
            const existingNames = new Set(prev.map(p => p.name));
            const uniqueNew = parsed.filter(p => !existingNames.has(p.name));
            return [...prev, ...uniqueNew];
          });
          showStatus(`Imported ${parsed.length} productions!`);
          setProdTab('dashboard');
        } catch (err) {
          console.error(err);
          showStatus("Error parsing WebArchive.");
        }
      };

      const handleWipeDatabase = (type) => {
          if(type === 'productions') saveToHistory(entries, []);
          if(type === 'entries') saveToHistory([], productions);
          setWipeModal(null);
          showStatus(`${type === 'productions' ? 'Shows' : 'Logs'} cleared.`);
      };

      const allShowsList = useMemo(() => [...new Set(productions.map(p => p.name).filter(Boolean))].sort(), [productions]);
      
      const filteredEntries = useMemo(() => {
          const now = new Date();
          return entries.filter(e => {
              const d = new Date(e.date + 'T12:00:00');
              if (globalFilter === 'All') return true;
              if (globalFilter === 'Year') return d.getFullYear() === now.getFullYear();
              if (globalFilter === 'Month') return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
              if (globalFilter === 'Week') return getISOWeek(d) === getISOWeek(now) && d.getFullYear() === now.getFullYear();
              return true;
          });
      }, [entries, globalFilter]);

      const stats = useMemo(() => {
          let g = 0, n = 0, actualH = 0, payableH = 0;
          const weekShowCombos = {};
          const daysSet = new Set();
          const showsSet = new Set();
          const weeksSet = new Set();
          const monthsSet = new Set();
          filteredEntries.forEach(e => {
              g += parseFloat(e.gross) || 0;
              n += parseFloat(e.net) || 0;
              actualH += e.hours || 0; 
              payableH += e.payableHours || 0;
              daysSet.add(e.date);
              if (e.show) showsSet.add(e.show);
              weeksSet.add(getWeekKey(e.date));
              monthsSet.add(e.date.substring(0, 7));
              const wsKey = `${getWeekKey(e.date)}_${e.show}`;
              if (!weekShowCombos[wsKey]) weekShowCombos[wsKey] = { hasPay: false };
              if (e.gross || e.net) weekShowCombos[wsKey].hasPay = true;
          });
          const pendingChecks = Object.values(weekShowCombos).filter(c => !c.hasPay).length;
          const weeksWorked = weeksSet.size;
          const monthsWorked = monthsSet.size;
          const avgPerWeek = weeksWorked ? g / weeksWorked : 0;
          const avgPerMonth = monthsWorked ? g / monthsWorked : 0;
          return { gross: g, net: n, actualHours: actualH, payableHours: payableH, days: daysSet.size, shows: showsSet.size, pending: pendingChecks, weeksWorked, avgPerWeek, avgPerMonth };
      }, [filteredEntries]);

      const weeklyGroups = useMemo(() => {
          const groups = {};
          filteredEntries.forEach(e => {
              const wKey = getWeekKey(e.date);
              if (!groups[wKey]) groups[wKey] = { shows: {}, th: 0, tph: 0, tg: 0, tn: 0, days: new Set(), sNames: new Set() };
              if (!groups[wKey].shows[e.show]) groups[wKey].shows[e.show] = { entries: [], g: 0, n: 0, actualH: 0, payableH: 0 };
              groups[wKey].shows[e.show].entries.push(e);
              groups[wKey].shows[e.show].g += parseFloat(e.gross) || 0;
              groups[wKey].shows[e.show].n += parseFloat(e.net) || 0;
              groups[wKey].shows[e.show].actualH += e.hours || 0;
              groups[wKey].shows[e.show].payableH += e.payableHours || 0;
              groups[wKey].th += e.hours || 0;
              groups[wKey].tph += e.payableHours || 0;
              groups[wKey].tg += parseFloat(e.gross) || 0;
              groups[wKey].tn += parseFloat(e.net) || 0;
              groups[wKey].days.add(e.date);
              if(e.show) groups[wKey].sNames.add(e.show);
          });
          return Object.entries(groups).sort((a,b) => b[0].localeCompare(a[0]));
      }, [filteredEntries]);

      const sortedProductions = useMemo(() => {
          return productions
              .filter(p => prodFilter === 'All' || p.status === prodFilter)
              .filter(p => p.name.toLowerCase().includes(prodSearchQuery.toLowerCase()));
      }, [productions, prodFilter, prodSearchQuery]);

      return (
        <div className="w-full min-h-screen pb-24 bg-slate-50 dark:bg-slate-950 text-slate-800 dark:text-slate-200 transition-colors duration-200">
          {statusMsg && (
              <div className="fixed top-20 left-1/2 -translate-x-1/2 z-[100] bg-emerald-500 text-white px-6 py-3 rounded-full font-black tracking-widest text-[10px] uppercase shadow-2xl animate-in fade-in slide-in-from-top-4">
                  {statusMsg}
              </div>
          )}

          <nav className="border-b dark:border-slate-800 border-slate-200 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md sticky top-0 z-40">
            <div className="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
              <div className="flex items-center gap-2">
                <div className="bg-brand-600 p-2 rounded-xl text-white shadow-lg"><Icons.Video /></div>
                <h1 className="text-xl font-black tracking-tighter uppercase hidden sm:block italic">Work<span className="text-brand-500">Hub</span></h1>
              </div>
              <div className="flex bg-slate-100 dark:bg-slate-900 p-1 rounded-2xl border dark:border-slate-800 shrink-0">
                <button onClick={() => setMainMode('timesheets')} className={`px-4 py-2 rounded-xl text-xs font-black uppercase transition-all ${mainMode === 'timesheets' ? 'bg-white dark:bg-slate-800 text-brand-600 shadow-md' : 'text-slate-500'}`}>Log</button>
                <button onClick={() => setMainMode('productions')} className={`px-4 py-2 rounded-xl text-xs font-black uppercase transition-all ${mainMode === 'productions' ? 'bg-white dark:bg-slate-800 text-brand-600 shadow-md' : 'text-slate-500'}`}>Shows</button>
                <button onClick={() => setMainMode('reports')} className={`px-4 py-2 rounded-xl text-xs font-black uppercase transition-all ${mainMode === 'reports' ? 'bg-white dark:bg-slate-800 text-brand-600 shadow-md' : 'text-slate-500'}`}>Reports</button>
              </div>
              <div className="flex gap-2 items-center">
                {history.length > 0 && (
                  <button onClick={handleUndo} className="p-2 text-brand-500 hover:bg-brand-500/10 rounded-xl transition-all" title="Undo Last Change">
                    <Icons.Undo />
                  </button>
                )}
                <button 
                  onClick={() => setIsSyncSettingsOpen(true)} 
                  className={`p-2 rounded-xl transition-all ${syncStatus === 'connected' ? 'text-emerald-500 bg-emerald-500/10' : syncStatus === 'error' ? 'text-red-500 bg-red-500/10' : 'text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800'}`}
                  title={syncStatus === 'connected' ? `Synced at ${lastSync?.toLocaleTimeString()}` : 'Cloud Sync'}
                >
                  <Icons.Cloud />
                </button>
                <button onClick={() => setTheme(theme === 'dark' ? 'light' : 'dark')} className="p-2 text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-xl transition-all"><Icons.Moon/></button>
              </div>
            </div>
          </nav>

          <main className="max-w-7xl mx-auto px-4 py-8">
            {isLoading ? (
              <div className="flex flex-col items-center justify-center py-24 space-y-4">
                <div className="w-12 h-12 border-4 border-brand-500 border-t-transparent rounded-full animate-spin"></div>
                <p className="text-xs font-black uppercase tracking-widest text-slate-400">Loading Data...</p>
              </div>
            ) : (
              <>
                {mainMode === 'timesheets' && (
              <div className="space-y-8">
                <div className="flex justify-between items-center">
                  <div className="flex bg-slate-100 dark:bg-slate-900 p-1 rounded-2xl border dark:border-slate-800">
                    {['All', 'Week', 'Month', 'Year'].map(f => (
                      <button key={f} onClick={() => setGlobalFilter(f)} className={`px-4 py-2 rounded-xl text-[10px] font-black uppercase transition-all ${globalFilter === f ? 'bg-white dark:bg-slate-800 text-brand-600 shadow-md' : 'text-slate-500'}`}>{f}</button>
                    ))}
                  </div>
                  <div className="flex gap-2">
                    <button onClick={() => setIsDashSettingsOpen(true)} className="p-3 bg-white dark:bg-slate-900 border dark:border-slate-800 rounded-2xl text-slate-400 hover:text-brand-500 shadow-sm transition-all"><Icons.Settings /></button>
                    <button onClick={() => setIsMobileFormOpen(true)} className="lg:hidden p-3 bg-brand-600 text-white rounded-2xl shadow-lg"><Icons.Plus /></button>
                  </div>
                </div>

                <StatGrid sourceData={stats} dashSettings={dashSettings} />

                <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                  <div className={`lg:col-span-4 ${isMobileFormOpen ? 'fixed inset-0 z-50 bg-slate-50 dark:bg-slate-950 p-6 overflow-y-auto' : 'hidden lg:block'}`}>
                    {isMobileFormOpen && <button onClick={() => setIsMobileFormOpen(false)} className="absolute top-6 right-6 p-2 bg-slate-200 dark:bg-slate-800 rounded-xl"><Icons.X /></button>}
                    <form onSubmit={handleTsSubmit} className="bg-white dark:bg-slate-900 p-8 rounded-[2.5rem] border dark:border-slate-800 space-y-6 shadow-xl sticky top-24">
                      <div className="flex justify-between items-center">
                        <h3 className="font-black text-2xl tracking-tighter">{isEditingEntry ? 'Edit Entry' : 'New Work Log'}</h3>
                        {!isEditingEntry && <button type="button" onClick={autoCalculateGross} className="p-2 bg-brand-500/10 text-brand-500 rounded-xl hover:bg-brand-500 hover:text-white transition-all"><Icons.Zap /></button>}
                      </div>
                      
                      <div className="space-y-4">
                        <div className="space-y-1">
                          <label className="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-2">Show Name</label>
                          <input list="shows" required value={formData.show} onChange={e => setFormData({...formData, show: e.target.value})} className="w-full bg-slate-50 dark:bg-slate-950 border dark:border-slate-800 p-4 rounded-2xl text-sm font-bold focus:ring-2 ring-brand-500 outline-none transition-all" placeholder="Select or type..."/>
                          <datalist id="shows">{allShowsList.map(s => <option key={s} value={s}/>)}</datalist>
                        </div>

                        <div className="grid grid-cols-2 gap-4">
                          <div className="space-y-1">
                            <label className="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-2">Date</label>
                            <input type="date" required value={formData.date} onChange={e => setFormData({...formData, date: e.target.value})} className="w-full bg-slate-50 dark:bg-slate-950 border dark:border-slate-800 p-4 rounded-2xl text-sm font-bold"/>
                          </div>
                          <div className="space-y-1">
                            <label className="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-2">Position</label>
                            <select value={formData.position} onChange={e => setFormData({...formData, position: e.target.value})} className="w-full bg-slate-50 dark:bg-slate-950 border dark:border-slate-800 p-4 rounded-2xl text-sm font-bold">
                              {POSITIONS.map(p => <option key={p} value={p}>{p}</option>)}
                            </select>
                          </div>
                        </div>

                        <div className="grid grid-cols-2 gap-4">
                          <div className="space-y-1">
                            <label className="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-2">Start Time</label>
                            <input type="time" required value={formData.startTime} onChange={e => setFormData({...formData, startTime: e.target.value})} className="w-full bg-slate-50 dark:bg-slate-950 border dark:border-slate-800 p-4 rounded-2xl text-sm font-bold"/>
                          </div>
                          <div className="space-y-1">
                            <label className="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-2">End Time</label>
                            <input type="time" required value={formData.endTime} onChange={e => setFormData({...formData, endTime: e.target.value})} className="w-full bg-slate-50 dark:bg-slate-950 border dark:border-slate-800 p-4 rounded-2xl text-sm font-bold"/>
                          </div>
                        </div>

                        <div className="grid grid-cols-2 gap-4">
                          <div className="space-y-1">
                            <label className="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-2">Gross Pay ($)</label>
                            <input type="number" step="0.01" value={formData.gross} onChange={e => setFormData({...formData, gross: e.target.value})} className="w-full bg-slate-50 dark:bg-slate-950 border dark:border-slate-800 p-4 rounded-2xl text-sm font-bold" placeholder="0.00"/>
                          </div>
                          <div className="space-y-1">
                            <label className="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-2">Net Pay ($)</label>
                            <input type="number" step="0.01" value={formData.net} onChange={e => setFormData({...formData, net: e.target.value})} className="w-full bg-slate-50 dark:bg-slate-950 border dark:border-slate-800 p-4 rounded-2xl text-sm font-bold" placeholder="0.00"/>
                          </div>
                        </div>

                        <div className="space-y-1">
                          <label className="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-2">Min Pay Type</label>
                          <div className="flex gap-2">
                            {['8hr', '10hr', '12hr', 'unknown'].map(t => (
                              <button key={t} type="button" onClick={() => setFormData({...formData, minPayType: t})} className={`flex-1 py-3 rounded-xl text-[10px] font-black uppercase border transition-all ${formData.minPayType === t ? 'bg-brand-600 border-brand-600 text-white shadow-md' : 'bg-slate-50 dark:bg-slate-950 border-slate-200 dark:border-slate-800 text-slate-400'}`}>{t}</button>
                            ))}
                          </div>
                        </div>

                        <div className="space-y-1">
                          <label className="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-2">Notes</label>
                          <textarea value={formData.notes} onChange={e => setFormData({...formData, notes: e.target.value})} className="w-full bg-slate-50 dark:bg-slate-950 border dark:border-slate-800 p-4 rounded-2xl text-sm font-bold h-20 resize-none" placeholder="Optional notes..."/>
                        </div>
                      </div>

                      <div className="flex gap-3">
                        {isEditingEntry && <button type="button" onClick={() => { setIsEditingEntry(false); setFormData({...formData, id: 0, gross: '', net: '', notes: '' }); }} className="flex-1 py-4 bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 font-black rounded-2xl uppercase text-[10px]">Cancel</button>}
                        <button type="submit" className="flex-[2] py-4 bg-brand-600 text-white font-black rounded-2xl uppercase text-[10px] shadow-lg shadow-brand-500/20 hover:scale-[1.02] active:scale-[0.98] transition-all">{isEditingEntry ? 'Update Entry' : 'Save Entry'}</button>
                      </div>
                    </form>
                  </div>

                  <div className="lg:col-span-8 space-y-6">
                    {weeklyGroups.length === 0 ? (
                      <div className="bg-white dark:bg-slate-900 p-12 rounded-[2.5rem] border dark:border-slate-800 text-center space-y-4">
                        <div className="bg-slate-100 dark:bg-slate-800 w-16 h-16 rounded-3xl flex items-center justify-center mx-auto text-slate-400"><Icons.Chart /></div>
                        <h4 className="font-black text-xl">No logs found</h4>
                        <p className="text-sm text-slate-500">Start by adding a new work log entry on the left.</p>
                      </div>
                    ) : (
                      weeklyGroups.map(([wKey, wData]) => (
                        <WeeklyCard 
                          key={wKey} 
                          wKey={wKey} 
                          wData={wData} 
                          expanded={expandedWeeks[wKey]} 
                          onToggle={() => setExpandedWeeks(prev => ({...prev, [wKey]: !prev[wKey]}))}
                          onEdit={(e) => { setFormData(e); setIsEditingEntry(true); setIsMobileFormOpen(true); }}
                          onDelete={handleTsDelete}
                          onPay={(wk, sn, g, n) => setPayModal({ isOpen: true, weekKey: wk, showName: sn, gross: g.toString(), net: n.toString() })}
                        />
                      ))
                    )}
                  </div>
                </div>
              </div>
            )}

            {mainMode === 'productions' && (
              <div className="space-y-8">
                <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                  <div className="flex bg-slate-100 dark:bg-slate-900 p-1 rounded-2xl border dark:border-slate-800">
                    {['dashboard', 'import'].map(t => (
                      <button key={t} onClick={() => setProdTab(t)} className={`px-4 py-2 rounded-xl text-[10px] font-black uppercase transition-all ${prodTab === t ? 'bg-white dark:bg-slate-800 text-brand-600 shadow-md' : 'text-slate-500'}`}>{t}</button>
                    ))}
                  </div>
                  <div className="flex gap-2 w-full md:w-auto">
                    <div className="relative flex-1 md:flex-none">
                      <div className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"><Icons.Search /></div>
                      <input type="text" value={prodSearchQuery} onChange={e => setProdSearchQuery(e.target.value)} placeholder="Search shows..." className="w-full md:w-64 bg-white dark:bg-slate-900 border dark:border-slate-800 pl-10 pr-4 py-3 rounded-2xl text-xs font-bold shadow-sm"/>
                    </div>
                    <button onClick={() => setIsProdSettingsOpen(true)} className="p-3 bg-white dark:bg-slate-900 border dark:border-slate-800 rounded-2xl text-slate-400 hover:text-brand-500 shadow-sm transition-all"><Icons.Settings /></button>
                  </div>
                </div>

                {prodTab === 'dashboard' && (
                  <div className="space-y-6">
                    <div className="flex justify-between items-center">
                      <div className="flex gap-2">
                        {['All', 'Active', 'Wrapped'].map(f => (
                          <button key={f} onClick={() => setProdFilter(f)} className={`px-4 py-2 rounded-xl text-[10px] font-black uppercase transition-all ${prodFilter === f ? 'bg-brand-600 text-white shadow-lg shadow-brand-500/20' : 'bg-white dark:bg-slate-900 border dark:border-slate-800 text-slate-400'}`}>{f}</button>
                        ))}
                      </div>
                      <div className="flex bg-slate-100 dark:bg-slate-900 p-1 rounded-xl border dark:border-slate-800">
                        <button onClick={() => setProdViewMode('card')} className={`p-2 rounded-lg transition-all ${prodViewMode === 'card' ? 'bg-white dark:bg-slate-800 text-brand-600 shadow-sm' : 'text-slate-400'}`}><Icons.Grid /></button>
                        <button onClick={() => setProdViewMode('list')} className={`p-2 rounded-lg transition-all ${prodViewMode === 'list' ? 'bg-white dark:bg-slate-800 text-brand-600 shadow-sm' : 'text-slate-400'}`}><Icons.List /></button>
                      </div>
                    </div>

                    {sortedProductions.length === 0 ? (
                      <div className="bg-white dark:bg-slate-900 p-12 rounded-[2.5rem] border dark:border-slate-800 text-center space-y-4">
                        <div className="bg-slate-100 dark:bg-slate-800 w-16 h-16 rounded-3xl flex items-center justify-center mx-auto text-slate-400"><Icons.Video /></div>
                        <h4 className="font-black text-xl">No shows found</h4>
                        <p className="text-sm text-slate-500">Import productions from the "Import" tab to get started.</p>
                      </div>
                    ) : prodViewMode === 'card' ? (
                      <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                        {sortedProductions.map(p => <ProductionCard key={p.id} prod={p} onView={setViewingProd} />)}
                      </div>
                    ) : (
                      <div className="bg-white dark:bg-slate-900 rounded-[2.5rem] border dark:border-slate-800 overflow-hidden shadow-xl">
                        <table className="w-full text-left text-sm">
                          <thead className="bg-slate-50 dark:bg-slate-800/50 border-b dark:border-slate-800">
                            <tr>
                              <th className="px-6 py-4 font-black uppercase tracking-widest text-[10px] text-slate-400">Show Name</th>
                              <th className="px-6 py-4 font-black uppercase tracking-widest text-[10px] text-slate-400">Company</th>
                              <th className="px-6 py-4 font-black uppercase tracking-widest text-[10px] text-slate-400">Status</th>
                              <th className="px-6 py-4 font-black uppercase tracking-widest text-[10px] text-slate-400 text-right">Actions</th>
                            </tr>
                          </thead>
                          <tbody className="divide-y dark:divide-slate-800">
                            {sortedProductions.map(p => (
                              <tr key={p.id} className="hover:bg-slate-50 dark:hover:bg-slate-800/30 transition-colors">
                                <td className="px-6 py-4 font-bold">{p.name}</td>
                                <td className="px-6 py-4 text-slate-500">{p.company}</td>
                                <td className="px-6 py-4">
                                  <span className={`px-2 py-1 rounded-md text-[9px] font-black uppercase ${p.status === 'Wrapped' ? 'bg-slate-100 text-slate-500 dark:bg-slate-800' : 'bg-emerald-500/10 text-emerald-500'}`}>{p.status}</span>
                                </td>
                                <td className="px-6 py-4 text-right">
                                  <button onClick={() => setViewingProd(p)} className="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg text-slate-400 hover:text-brand-500 transition-colors"><Icons.Search /></button>
                                </td>
                              </tr>
                            ))}
                          </tbody>
                        </table>
                      </div>
                    )}
                  </div>
                )}

                {prodTab === 'import' && (
                  <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <div className="bg-white dark:bg-slate-900 p-8 rounded-[2.5rem] border dark:border-slate-800 shadow-xl space-y-6">
                      <div className="flex items-center gap-3">
                        <div className="bg-brand-500/10 p-3 rounded-2xl text-brand-500"><Icons.Upload /></div>
                        <h4 className="font-black text-xl tracking-tighter">Import from HTML</h4>
                      </div>
                      <p className="text-sm text-slate-500">Paste the HTML source from the production list page to automatically import all shows and crew data.</p>
                      <textarea value={scratchpadText} onChange={e => setScratchpadText(e.target.value)} placeholder="Paste HTML source here..." className="w-full h-48 bg-slate-50 dark:bg-slate-950 border dark:border-slate-800 p-4 rounded-3xl text-xs font-mono focus:ring-2 ring-brand-500 outline-none transition-all no-scrollbar"/>
                      <button onClick={handleHTMLImport} className="w-full py-4 bg-brand-600 text-white font-black rounded-2xl uppercase text-[10px] shadow-lg shadow-brand-500/20 hover:scale-[1.02] active:scale-[0.98] transition-all">Process HTML Content</button>
                    </div>

                    <div className="bg-white dark:bg-slate-900 p-8 rounded-[2.5rem] border dark:border-slate-800 shadow-xl space-y-6">
                      <div className="flex items-center gap-3">
                        <div className="bg-emerald-500/10 p-3 rounded-2xl text-emerald-500"><Icons.Video /></div>
                        <h4 className="font-black text-xl tracking-tighter">Import from PDF</h4>
                      </div>
                      <p className="text-sm text-slate-500">Select a production list PDF file to parse data offline using PDF.js.</p>
                      <div className="border-2 border-dashed dark:border-slate-800 rounded-3xl p-12 text-center space-y-4 hover:border-brand-500 transition-colors cursor-pointer relative">
                        <input type="file" accept=".pdf" onChange={handlePDFImport} className="absolute inset-0 opacity-0 cursor-pointer"/>
                        <div className="bg-slate-100 dark:bg-slate-800 w-16 h-16 rounded-3xl flex items-center justify-center mx-auto text-slate-400"><Icons.Upload /></div>
                        <p className="text-sm font-bold">Click or drag PDF here</p>
                        <p className="text-[10px] text-slate-400 uppercase font-black tracking-widest">Supports IATSE 873 PDF Format</p>
                      </div>
                    </div>

                    <div className="bg-white dark:bg-slate-900 p-8 rounded-[2.5rem] border dark:border-slate-800 shadow-xl space-y-6">
                      <div className="flex items-center gap-3">
                        <div className="bg-brand-500/10 p-3 rounded-2xl text-brand-500"><Icons.Upload /></div>
                        <h4 className="font-black text-xl tracking-tighter">Import from WebArchive</h4>
                      </div>
                      <p className="text-sm text-slate-500">Select a .webarchive file saved from Safari on iPhone/Mac.</p>
                      <div className="border-2 border-dashed dark:border-slate-800 rounded-3xl p-12 text-center space-y-4 hover:border-brand-500 transition-colors cursor-pointer relative">
                        <input type="file" accept=".webarchive" onChange={handleWebArchiveImport} className="absolute inset-0 opacity-0 cursor-pointer"/>
                        <div className="bg-slate-100 dark:bg-slate-800 w-16 h-16 rounded-3xl flex items-center justify-center mx-auto text-slate-400"><Icons.Upload /></div>
                        <p className="text-sm font-bold">Click or drag WebArchive here</p>
                      </div>
                    </div>
                  </div>
                )}
              </div>
            )}

            {mainMode === 'reports' && (
              <div className="space-y-8">
                <div className="bg-white dark:bg-slate-900 p-8 rounded-[2.5rem] border dark:border-slate-800 shadow-xl space-y-6">
                  <div className="flex items-center gap-3">
                    <div className="bg-brand-500/10 p-3 rounded-2xl text-brand-500"><Icons.Chart /></div>
                    <h4 className="font-black text-xl tracking-tighter">Data Management</h4>
                  </div>
                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <button onClick={exportCSV} className="flex items-center justify-center gap-3 py-4 bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-300 font-black rounded-2xl uppercase text-[10px] hover:bg-brand-600 hover:text-white transition-all">
                      <Icons.Upload /> Export to CSV
                    </button>
                    <label className="flex items-center justify-center gap-3 py-4 bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-300 font-black rounded-2xl uppercase text-[10px] hover:bg-brand-600 hover:text-white transition-all cursor-pointer">
                      <Icons.Upload /> Import from CSV
                      <input type="file" accept=".csv" onChange={importCSV} className="hidden"/>
                    </label>
                  </div>
                  <div className="pt-6 border-t dark:border-slate-800">
                    <h5 className="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-4">Danger Zone</h5>
                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                      <button onClick={() => setWipeModal('entries')} className="flex items-center justify-center gap-3 py-4 bg-red-500/10 text-red-500 font-black rounded-2xl uppercase text-[10px] hover:bg-red-500 hover:text-white transition-all">
                        <Icons.Trash /> Wipe Work Logs
                      </button>
                      <button onClick={() => setWipeModal('productions')} className="flex items-center justify-center gap-3 py-4 bg-red-500/10 text-red-500 font-black rounded-2xl uppercase text-[10px] hover:bg-red-500 hover:text-white transition-all">
                        <Icons.Trash /> Wipe Shows
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            )}
          </>
        )}
      </main>

          {/* MODALS */}
          <Modal isOpen={payModal.isOpen} onClose={() => setPayModal({...payModal, isOpen: false})} title="Mark as Paid">
            <div className="space-y-6">
              <p className="text-sm text-slate-500">Enter the actual amounts from your pay stub for <span className="font-bold text-slate-800 dark:text-slate-200">{payModal.showName}</span>.</p>
              <div className="grid grid-cols-2 gap-4">
                <div className="space-y-1">
                  <label className="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-2">Gross Amount</label>
                  <input type="number" step="0.01" value={payModal.gross} onChange={e => setPayModal({...payModal, gross: e.target.value})} className="w-full bg-slate-50 dark:bg-slate-950 border dark:border-slate-800 p-4 rounded-2xl text-sm font-bold"/>
                </div>
                <div className="space-y-1">
                  <label className="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-2">Net Amount</label>
                  <input type="number" step="0.01" value={payModal.net} onChange={e => setPayModal({...payModal, net: e.target.value})} className="w-full bg-slate-50 dark:bg-slate-950 border dark:border-slate-800 p-4 rounded-2xl text-sm font-bold"/>
                </div>
              </div>
              <button onClick={() => {
                const g = parseFloat(payModal.gross) || 0;
                const n = parseFloat(payModal.net) || 0;
                setEntries(prev => prev.map(e => (getWeekKey(e.date) === payModal.weekKey && e.show === payModal.showName) ? { ...e, gross: g / prev.filter(x => getWeekKey(x.date) === payModal.weekKey && x.show === payModal.showName).length, net: n / prev.filter(x => getWeekKey(x.date) === payModal.weekKey && x.show === payModal.showName).length } : e));
                setPayModal({...payModal, isOpen: false});
                showStatus("Pay updated!");
              }} className="w-full py-4 bg-emerald-500 text-white font-black rounded-2xl uppercase text-[10px] shadow-lg shadow-emerald-500/20">Save Pay Info</button>
            </div>
          </Modal>

          <Modal isOpen={isSyncSettingsOpen} onClose={() => setIsSyncSettingsOpen(false)} title="Cloud Sync Settings">
            <div className="space-y-6">
              <div className="bg-slate-50 dark:bg-slate-950 p-6 rounded-3xl border dark:border-slate-800 space-y-4">
                <div className="flex items-center gap-3">
                  <div className={`w-3 h-3 rounded-full ${syncStatus === 'connected' ? 'bg-emerald-500 animate-pulse' : syncStatus === 'connecting' ? 'bg-brand-500 animate-pulse' : syncStatus === 'error' ? 'bg-red-500' : 'bg-slate-300'}`}></div>
                  <p className="text-xs font-black uppercase tracking-widest text-slate-500">
                    Status: <span className={syncStatus === 'connected' ? 'text-emerald-500' : syncStatus === 'error' ? 'text-red-500' : ''}>{syncStatus}</span>
                  </p>
                </div>
                {lastSync && <p className="text-[10px] text-slate-400 font-bold uppercase">Last Sync: {lastSync.toLocaleString()}</p>}
              </div>

              <div className="space-y-4">
                <div className="space-y-1">
                  <label className="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-2">Sync ID (Secret Key)</label>
                  <input 
                    type="password" 
                    value={syncId} 
                    onChange={e => {
                      setSyncId(e.target.value);
                      localStorage.setItem('pt_sync_id', e.target.value);
                    }} 
                    className="w-full bg-slate-50 dark:bg-slate-950 border dark:border-slate-800 p-4 rounded-2xl text-sm font-bold"
                    placeholder="Enter a unique private key..."
                  />
                  <p className="text-[9px] text-slate-400 ml-2">Use the same key on all your devices to sync data.</p>
                </div>

                <div className="space-y-1">
                  <label className="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-2">Firebase Config (JSON)</label>
                  <textarea 
                    value={fbConfig ? JSON.stringify(fbConfig, null, 2) : ''} 
                    onChange={e => {
                      try {
                        const parsed = JSON.parse(e.target.value);
                        setFbConfig(parsed);
                        localStorage.setItem('pt_fb_config', JSON.stringify(parsed));
                      } catch (err) {}
                    }} 
                    className="w-full bg-slate-50 dark:bg-slate-950 border dark:border-slate-800 p-4 rounded-2xl text-[10px] font-mono h-32 resize-none"
                    placeholder='{"apiKey": "...", "projectId": "...", ...}'
                  />
                </div>
              </div>

              <div className="flex gap-3">
                <button 
                  onClick={async () => {
                    if (syncStatus !== 'connected' || !fbDbRef.current || !syncId) return;
                    try {
                      setSyncStatus('connecting');
                      const db = fbDbRef.current;
                      await window.FB.setDoc(window.FB.doc(db, "users", syncId), {
                        entries,
                        productions,
                        updatedAt: new Date()
                      }, { merge: true });
                      setLastSync(new Date());
                      setSyncStatus('connected');
                      showStatus("Cloud updated!");
                    } catch (err) {
                      setSyncStatus('error');
                      showStatus("Sync failed!");
                    }
                  }}
                  className="flex-1 py-4 bg-brand-600 text-white font-black rounded-2xl uppercase text-[10px] shadow-lg shadow-brand-500/20"
                >
                  Sync Now
                </button>
                <button 
                  onClick={() => {
                    setFbConfig(null);
                    setSyncId('');
                    localStorage.removeItem('pt_fb_config');
                    localStorage.removeItem('pt_sync_id');
                    setSyncStatus('disconnected');
                    showStatus("Cloud disconnected");
                  }}
                  className="flex-1 py-4 bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 font-black rounded-2xl uppercase text-[10px]"
                >
                  Disconnect
                </button>
              </div>

              <div className="bg-brand-500/5 p-6 rounded-3xl border border-brand-500/10 space-y-3">
                <h4 className="text-xs font-black uppercase tracking-widest text-brand-600">How to Setup:</h4>
                <ol className="text-[10px] text-slate-500 space-y-2 list-decimal ml-4">
                  <li>Create a project at <a href="https://console.firebase.google.com" target="_blank" className="text-brand-500 underline">Firebase Console</a></li>
                  <li>Enable <b>Firestore Database</b> and <b>Anonymous Auth</b></li>
                  <li>Add a "Web App" to get your <b>Firebase Config</b></li>
                  <li>Paste the config JSON above and set a <b>Sync ID</b></li>
                </ol>
              </div>
            </div>
          </Modal>

          <Modal isOpen={isDashSettingsOpen} onClose={() => setIsDashSettingsOpen(false)} title="Dashboard Settings">
            <div className="space-y-6">
              <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                {Object.keys(DEFAULT_DASH_SETTINGS).map(key => (
                  <label key={key} className="flex items-center gap-3 p-4 bg-slate-50 dark:bg-slate-950 rounded-2xl border dark:border-slate-800 cursor-pointer hover:border-brand-500 transition-all">
                    <input type="checkbox" checked={dashSettings[key]} onChange={e => {
                      const next = {...dashSettings, [key]: e.target.checked};
                      setDashSettings(next);
                      localStorage.setItem('pt_dash_settings', JSON.stringify(next));
                    }} className="w-5 h-5 rounded-lg border-slate-300 text-brand-600 focus:ring-brand-500"/>
                    <span className="text-xs font-bold uppercase tracking-widest text-slate-600 dark:text-slate-400">{key.replace(/([A-Z])/g, ' $1')}</span>
                  </label>
                ))}
              </div>
            </div>
          </Modal>

          <Modal isOpen={!!viewingProd} onClose={() => setViewingProd(null)} title="Show Details">
            {viewingProd && (
              <div className="space-y-6">
                <div className="bg-slate-50 dark:bg-slate-950 p-6 rounded-3xl border dark:border-slate-800 space-y-4">
                  <div>
                    <p className="text-[10px] font-black uppercase tracking-widest text-slate-400">Company</p>
                    <p className="font-bold">{viewingProd.company}</p>
                  </div>
                  <div>
                    <p className="text-[10px] font-black uppercase tracking-widest text-slate-400">Dates</p>
                    <p className="font-bold">{viewingProd.dates}</p>
                  </div>
                  <div>
                    <p className="text-[10px] font-black uppercase tracking-widest text-slate-400">Tier</p>
                    <p className="font-bold">{viewingProd.tier}</p>
                  </div>
                  {viewingProd.prodEmail && (
                    <div>
                      <p className="text-[10px] font-black uppercase tracking-widest text-slate-400">Production Email</p>
                      <a href={`mailto:${viewingProd.prodEmail}`} className="font-bold text-brand-500 hover:underline">{viewingProd.prodEmail}</a>
                    </div>
                  )}
                  {viewingProd.payroll && (
                    <div>
                      <p className="text-[10px] font-black uppercase tracking-widest text-slate-400">Payroll Email</p>
                      <a href={`mailto:${viewingProd.payroll}`} className="font-bold text-brand-500 hover:underline">{viewingProd.payroll}</a>
                    </div>
                  )}
                  {viewingProd.phone && (
                    <div>
                      <p className="text-[10px] font-black uppercase tracking-widest text-slate-400">Phone</p>
                      <a href={`tel:${viewingProd.phone}`} className="font-bold text-brand-500 hover:underline flex items-center gap-2"><Icons.Phone /> {viewingProd.phone}</a>
                    </div>
                  )}
                  {viewingProd.address && (
                    <div>
                      <p className="text-[10px] font-black uppercase tracking-widest text-slate-400">Address</p>
                      <a href={`https://maps.google.com/?q=${encodeURIComponent(viewingProd.address)}`} target="_blank" className="font-bold text-brand-500 hover:underline flex items-center gap-2"><Icons.MapPin /> {viewingProd.address}</a>
                    </div>
                  )}
                  <div className="grid grid-cols-2 gap-3 pt-2">
                    <button onClick={() => {
                      const url = prompt("Enter Contract Link:", viewingProd.contractLink);
                      if (url !== null) setProductions(prev => prev.map(p => p.id === viewingProd.id ? {...p, contractLink: url} : p));
                    }} className="flex items-center justify-center gap-2 py-3 bg-slate-100 dark:bg-slate-800 rounded-2xl text-[10px] font-black uppercase text-slate-600 dark:text-slate-300">
                      <Icons.Link /> Contract
                    </button>
                    <button onClick={() => {
                      const url = prompt("Enter Call Sheet Link:", viewingProd.callSheetLink);
                      if (url !== null) setProductions(prev => prev.map(p => p.id === viewingProd.id ? {...p, callSheetLink: url} : p));
                    }} className="flex items-center justify-center gap-2 py-3 bg-slate-100 dark:bg-slate-800 rounded-2xl text-[10px] font-black uppercase text-slate-600 dark:text-slate-300">
                      <Icons.Link /> Call Sheet
                    </button>
                  </div>
                </div>
                {Object.keys(viewingProd.crew).length > 0 && (
                  <div className="space-y-3">
                    <h4 className="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-2">Crew List</h4>
                    <div className="grid grid-cols-1 gap-2">
                      {Object.entries(viewingProd.crew).map(([role, name]) => (
                        <div key={role} className="flex justify-between items-center p-3 bg-white dark:bg-slate-900 border dark:border-slate-800 rounded-xl">
                          <span className="text-[10px] font-black uppercase text-slate-400">{role}</span>
                          <span className="text-xs font-bold">{name}</span>
                        </div>
                      ))}
                    </div>
                  </div>
                )}
              </div>
            )}
          </Modal>

          <Modal isOpen={!!wipeModal} onClose={() => setWipeModal(null)} title="Confirm Wipe">
            <div className="space-y-6 text-center">
              <div className="bg-red-500/10 w-16 h-16 rounded-3xl flex items-center justify-center mx-auto text-red-500"><Icons.Trash /></div>
              <p className="text-sm text-slate-500">Are you sure you want to permanently delete all <span className="font-bold text-slate-800 dark:text-slate-200">{wipeModal === 'entries' ? 'work logs' : 'production data'}</span>? This action cannot be undone.</p>
              <div className="flex gap-3">
                <button onClick={() => setWipeModal(null)} className="flex-1 py-4 bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 font-black rounded-2xl uppercase text-[10px]">Cancel</button>
                <button onClick={() => handleWipeDatabase(wipeModal)} className="flex-1 py-4 bg-red-500 text-white font-black rounded-2xl uppercase text-[10px] shadow-lg shadow-red-500/20">Delete All</button>
              </div>
            </div>
          </Modal>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
